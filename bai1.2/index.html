<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1.2 - Bộ Lọc & Tìm Kiếm Danh Sách</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Quản Lý Điểm Sinh Viên (Nâng Cao)</h2>
        
        <div class="input-section">
            <input type="text" id="txtName" placeholder="Nhập họ và tên sinh viên...">
            <input type="number" id="txtGrade" placeholder="Nhập điểm (0 - 10)" min="0" max="10" step="0.1">
            <button id="btnAdd">Thêm</button>
        </div>

        <hr class="divider">

        <div class="filter-section">
            <input type="text" id="searchName" placeholder="🔍 Tìm kiếm theo tên...">
            <select id="filterRank">
                <option value="all">Tất cả xếp loại</option>
                <option value="Giỏi">Giỏi</option>
                <option value="Khá">Khá</option>
                <option value="Trung bình">Trung bình</option>
                <option value="Yếu">Yếu</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ Tên</th>
                    <th id="colSortGrade" class="sortable" title="Click để sắp xếp">Điểm <span id="sortIcon">↕</span></th>
                    <th>Xếp loại</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="studentTbody">
                </tbody>
        </table>

        <div id="noResults" class="hidden text-center">Không có kết quả tìm kiếm.</div>

        <div class="stats-section">
            <p>Đang hiển thị: <strong id="totalStudents">0</strong> SV</p>
            <p>Điểm trung bình (danh sách hiện tại): <strong id="averageGrade">0.0</strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
